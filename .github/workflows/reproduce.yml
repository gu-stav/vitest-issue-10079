name: Reproduce

on:
  push:
  workflow_dispatch:

jobs:
  reproduce:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        node-version: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install

      - name: Run vitest 30 times, stop on first failure
        shell: bash
        run: |
          for i in $(seq 1 30); do
            echo "::group::Iteration $i"
            if ! npx vitest run --reporter=verbose; then
              echo "::endgroup::"
              echo "Failed on iteration $i"
              exit 1
            fi
            echo "::endgroup::"
          done
          echo "All 30 iterations passed"
